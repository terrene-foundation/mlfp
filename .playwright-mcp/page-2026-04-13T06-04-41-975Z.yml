  - generic [ref=e19]: "Graph Data: Nodes, Edges, Adjacency Foundations Components Nodes (V): entities (people, atoms, papers) Edges (E): relationships (friendships, bonds, citations) Adjacency matrix (A): A i j = 1 if edge between i and j Node features (X): attributes of each node Applications Domain Nodes Edges Social Users Friendships Chemistry Atoms Bonds Academic Papers Citations Logistics Locations Routes Why not CNN/RNN? Graphs have variable size, no fixed ordering, irregular connectivity. Standard architectures cannot handle this. CNN — regular grid every node has 4 (or 8) fixed neighbours GNN — irregular graph 1 4 3 2 4 2 each node has different number of neighbours (degree shown) MLFP Module 5 — Terrene Open Academy"