      - generic [ref=e1230]: Applications
      - generic [ref=e1231]: The BERT fine-tuning pipeline you ran on AG News in Exercise 4 is the same pipeline used everywhere that text has to be classified, summarised, or routed at scale. Swap the dataset, keep the architecture.
      - generic [ref=e1232]:
        - generic [ref=e1233]:
          - generic [ref=e1234]:
            - strong [ref=e1235]: Finance — Earnings Call & SEC Filing Sentiment
            - paragraph [ref=e1236]: Sell-side analysts fine-tune BERT on labelled earnings-call transcripts to score each quarter as beat / miss / guidance-cut — in the first minute after the call ends, not after a human has read it. A MAS-supervised fund house fine-tunes the same model on SGX filings to flag risk language (e.g., "going concern", "material weakness") for the credit desk.
          - generic [ref=e1237]:
            - strong [ref=e1238]: Healthcare — Clinical Note Summarisation
            - paragraph [ref=e1239]: Fine-tuned T5 and BART models at public hospitals convert 2,000-word admission notes into 200-word discharge summaries. The clinician edits the summary instead of writing it from scratch — saving 15 minutes per patient across 2M admissions a year. The self-attention mechanism is the same one you derived by hand.
        - generic [ref=e1240]:
          - generic [ref=e1241]:
            - strong [ref=e1242]: Customer Service — IRAS Tax Query Routing
            - paragraph [ref=e1243]:
              - text: A public-sector contact centre fine-tunes BERT on historical tickets to classify incoming queries into 40+ tax-topic buckets and route them to the right specialist. Accuracy on the first 20 classes exceeds the human baseline; the remaining 20 are human-in-the-loop. That is the
              - emphasis [ref=e1244]: exact
              - text: 4-class AG News fine-tune you just ran, scaled up and domain-swapped.
          - generic [ref=e1245]:
            - strong [ref=e1246]: Legal — Contract Review Assistance
            - paragraph [ref=e1247]:
              - text: Singapore law firms use fine-tuned transformers to extract obligations, liabilities, and termination clauses from draft contracts. The model highlights the spans; the associate reviews a ranked list. Multi-head attention visualisations are the interpretability layer — the partner wants to see
              - emphasis [ref=e1248]: why
              - text: the model flagged a clause.
      - generic [ref=e1249]:
        - strong [ref=e1250]: "Why this matters for YOU:"
        - text: Fine-tuning a pre-trained transformer is the cheapest high-impact ML project most organisations can run. You are not training a model from scratch — you are adapting one that already knows language. Data requirements drop by 10× to 100×, training time drops from weeks to hours, and the resulting model is genuinely production-ready. This is where the biggest ROI in M5 lives.
