      - heading [level=2]: "Variant 1: Vanilla Autoencoder"
      - generic: Foundations
      - generic:
        - generic:
          - heading [level=3]: Architecture
          - list:
            - listitem: Fully connected layers only
            - listitem: "Undercomplete: latent dim < input dim"
            - listitem: Simplest form — the baseline
          - generic:
            - code: "class VanillaAutoencoder(nn.Module): def __init__(self, input_dim, latent_dim): super().__init__() self.encoder = nn.Sequential( nn.Linear(input_dim, 128), nn.ReLU(), nn.Linear(128, latent_dim)) self.decoder = nn.Sequential( nn.Linear(latent_dim, 128), nn.ReLU(), nn.Linear(128, input_dim), nn.Sigmoid())"
        - generic:
          - heading [level=3]: When to Use
          - list:
            - listitem: Dimensionality reduction (like PCA, but nonlinear)
            - listitem: Feature extraction for downstream tasks
            - listitem: Anomaly detection (high reconstruction error = anomaly)
          - generic:
            - strong: "Key insight:"
            - text: If latent_dim = input_dim, the network just copies. The bottleneck is what forces learning.
      - generic:
