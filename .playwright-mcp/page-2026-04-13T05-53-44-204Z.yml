  - text: Speaker notes
  - generic [ref=e19]: "Lesson 5.8: Real-World Applications Applications Unlike every other lesson in M5, here the exercise environments are the applications. You are not looking at an analogy — you are coding the same decision problems real operations teams face, with the same reward structure and the same state/action space. Telecom — ChurnPrevention (DQN) Singtel's retention team picks a discount tier (do nothing / small / medium / large) each month per customer. Reward = retained revenue − discount cost. The DQN you train in Exercise 8 learns to save its big discounts for customers about to churn, not those who would stay anyway. A rules engine hands out discounts uniformly; the RL policy targets them. Retail — DynamicPricing (SAC) Lazada / Shopee price roughly 100M SKUs in real time across demand shocks, competitor moves, and inventory levels. SAC handles the continuous action space (price can be any value in a range) and the uncertainty (demand is noisy). Same continuous-action problem as in your custom env, just at warehouse scale. Asset Management — PortfolioRebalancing (PPO) A quant fund rebalances weights across N assets under transaction cost and risk constraints. The PPO clipped objective prevents wild reweighting between steps — exactly what regulators and risk desks require. Same clipped-surrogate trick you coded. Logistics — SupplyChainInventory (PPO) A Singapore FMCG distributor decides daily replenishment quantities for each of 3,000 SKUs across 40 retail partners. Reward = service level − holding cost − stockout penalty. The RL policy beats rolling safety-stock formulas because it learns which SKUs genuinely co-move and which do not. Cloud Ops — ResourceAllocation (A2C) A cloud platform allocates CPU / memory / I/O quotas across tenants under SLA constraints. A2C's advantage baseline reduces variance in the policy-gradient update — critical because allocation decisions are high-stakes and the reward signal is noisy. This is how modern schedulers are increasingly being replaced by learned policies. Bridge to M6 — RLHF for LLM Alignment The PPO you wrote for CartPole is the same algorithm that aligns ChatGPT, Claude, and Gemini to human preferences. Reward = human preference model score; action = next token. Exercise 8 is literally the training loop of modern LLM alignment, minus the reward model. Why this matters for YOU: RL is the right tool for repeated operational decisions under feedback — pricing, inventory, resource allocation, retention. The ROI is in the compounding: a small edge per decision times millions of decisions is material. Most importantly, RL is also how modern LLMs are trained to be useful at all, which is why Module 6 picks up exactly where this lesson stops. MLFP Module 5 — Terrene Open Academy"