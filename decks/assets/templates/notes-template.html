<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>{{LESSON_NUMBER}} {{LESSON_TITLE}} — Speaker Notes</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../../assets/css/textbook.css">
  <style>
    .slide-block {
      margin: 1.5em 0;
      padding: 18px 22px;
      background: var(--mlfp-bg-alt);
      border-left: 4px solid var(--mlfp-primary);
      border-radius: 6px;
    }
    .slide-block .meta {
      font-size: 0.85em;
      color: var(--mlfp-text-muted);
      display: flex;
      gap: 16px;
      margin-bottom: 8px;
    }
    .slide-block .meta .badge {
      background: var(--mlfp-primary);
      color: white;
      padding: 2px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .slide-block h3 {
      margin: 0.2em 0 0.4em;
      color: var(--mlfp-text);
      font-size: 1.15em;
    }
    .audience-cue {
      margin-top: 12px;
      padding: 8px 12px;
      font-size: 0.9em;
      border-radius: 4px;
    }
    .audience-cue.beginner { background: rgba(34, 197, 94, 0.08); border-left: 3px solid var(--mlfp-foundations); }
    .audience-cue.expert { background: rgba(139, 92, 246, 0.08); border-left: 3px solid var(--mlfp-advanced); }
    .transition {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px dashed var(--mlfp-border);
      font-style: italic;
      color: var(--mlfp-text-muted);
    }
  </style>
</head>

    </span>
  </nav>

    <h1 class="lesson-title">
      <span class="lesson-number">Speaker Notes — {{LESSON_NUMBER}}</span>
      {{LESSON_TITLE}}
    </h1>

    <p class="lead">Total time: {{LESSON_TIME}} minutes</p>

    <!-- Per-slide blocks -->
    {{SLIDE_BLOCKS}}

  </main>
</body>
</html>
