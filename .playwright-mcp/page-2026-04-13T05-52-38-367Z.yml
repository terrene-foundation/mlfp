      - heading [level=2]: "Lesson 5.2: Real-World Applications"
      - generic: Applications
      - generic: The same CIFAR-10 pipeline you just built — convolutions, residual blocks, SE attention, ONNX export — powers production image classifiers across every industry that has cameras.
      - generic:
        - generic:
          - generic:
            - strong: Healthcare — Chest X-Ray Triage
            - paragraph: ResNet with SE blocks, fine-tuned on a Singapore public-health chest X-ray corpus, classifies scans into "normal / pneumonia / tuberculosis / other" and ranks the worst cases to the top of the radiologist's queue. The same architecture you wrote in Exercise 2, trained on medical images instead of CIFAR.
          - generic:
            - strong: Retail — Shelf Monitoring at FairPrice, Cold Storage
            - paragraph: "Cameras above each aisle feed a CNN that counts SKUs, detects out-of-stocks, and identifies misplaced items. The store manager gets a dashboard ranked by lost-sales-per-hour, not a 200-aisle walkthrough. Latency budget: under 200ms per frame — exactly the kind of workload ONNX export was built for."
        - generic:
          - generic:
            - strong: Manufacturing — Automated Quality Control
            - paragraph: A Singapore precision-engineering firm uses a ResNet variant to grade machined parts on a conveyor belt. Mixed-precision training halved GPU cost during weekly retraining; SE blocks improved recall on a rare defect class from 71% to 89%. The trained model is exported to ONNX and served on the factory-floor edge server.
          - generic:
            - strong: Public Safety — MRT Crowd Density from CCTV
            - paragraph: SMRT platforms use CNN-based crowd counting from existing CCTV feeds to predict overcrowding before it happens, triggering train dispatch or gate throttling. The output of the last conv layer is a density map, not a single number — the same "later layers = higher-level features" hierarchy you learned.
      - generic:
        - strong: "Why this matters for YOU:"
        - text: "Every production CNN you will deploy starts with the same three decisions you faced in Exercise 2 — how deep, which residual pattern, and whether attention blocks earn their compute budget. The exercise numbers transfer directly: a 2% accuracy gain from SE blocks at modest compute cost is often the difference between a model that ships and one that does not."
