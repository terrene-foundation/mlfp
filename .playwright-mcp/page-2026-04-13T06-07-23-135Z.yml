  - generic [ref=e19]: "NLP Transfer Learning: BERT Fine-Tuning Theory HuggingFace Pipeline from transformers import ( AutoTokenizer, AutoModelForSequenceClassification, TrainingArguments, Trainer ) model_name = \"bert-base-uncased\" tokenizer = AutoTokenizer.from_pretrained( model_name) model = AutoModelForSequenceClassification \\ .from_pretrained( model_name, num_labels=num_classes) args = TrainingArguments( learning_rate= 2e-5 , num_train_epochs= 3 , per_device_train_batch_size= 16 , warmup_steps= 500 ) trainer = Trainer( model=model, args=args, train_dataset=train_ds, eval_dataset=eval_ds) trainer.train() Key Considerations Learning rate: 2e-5 to 5e-5 (BERT paper recommendation) Epochs: 2-4 (more risks overfitting on small datasets) Warmup: gradual learning rate increase prevents early instability Max sequence length: BERT supports up to 512 tokens Adapter modules: Instead of fine-tuning all parameters, add small bottleneck layers between transformer layers. Train only the adapters. Much fewer parameters to update. Connects to LoRA in M6. x W d × d frozen pretrained A d × r B r × d + h LoRA math h = Wx + B(Ax) rank r ≪ d trainable params: 2 · d · r vs full fine-tune: d² backprop only updates A and B (green path) MLFP Module 5 — Terrene Open Academy"