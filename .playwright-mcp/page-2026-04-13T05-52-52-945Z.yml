              - strong: "Query (Q):"
              - text: "\"What am I looking for?\""
            - listitem:
              - strong: "Key (K):"
              - text: "\"What do I contain?\""
            - listitem:
              - strong: "Value (V):"
              - text: "\"What information do I carry?\""
          - paragraph: Each token projects its embedding into Q, K, and V via learned weight matrices.
        - generic:
          - generic:
            - strong: "Analogy:"
            - text: A library search. Your Query is your question. Each book has a Key (title/index). You compare your Query with all Keys to find the best matches. Then you read the Values (content) of the matching books.
          - generic:
            - strong: "Key difference from RNN attention:"
            - text: In RNN attention, queries come from the decoder and keys/values from the encoder. In
            - emphasis: self
            - text: "-attention, Q, K, V all come from the same sequence — each token attends to every other token."
