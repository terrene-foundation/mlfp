  - text: Speaker notes
  - generic [ref=e19]: "GAN Training Challenges Theory Mode Collapse Symptom: Generator produces the same output regardless of input noise. It found one image that fools the discriminator and keeps producing it. Solutions WGAN: Wasserstein distance encourages full coverage Minibatch discrimination: D sees batch statistics Spectral normalisation: stabilise D's Lipschitz constant Training Instability Symptom: Loss oscillates wildly. G and D alternate between dominance. No convergence. Best Practices Use Adam with low learning rate (0.0002) Train D more steps than G (e.g., 5:1 ratio) Use label smoothing (real labels = 0.9, not 1.0) Monitor FID during training, not just loss MLFP Module 5 — Terrene Open Academy"