  - generic [ref=e19]: "The Convolution Operation Foundations How It Works Filter (kernel): small matrix (e.g., 3x3) that slides over the input Stride: how far the filter moves each step Padding: zeros added around the border to control output size Feature map: the output after applying one filter Analogy: A magnifying glass scanning across a photo, detecting one specific pattern at every position. Output Size Formula O = W − F + 2 P S + 1 W = input size, F = filter size, P = padding, S = stride Example: Input 28x28, filter 3x3, padding 1, stride 1: ( 2 8 − 3 + 2 ) / 1 + 1 = 2 8 . Same spatial dimensions — this is \"same\" padding. Input image 3×3 filter (kernel) w₁ w₂ w₃ w₄ w₅ w₆ w₇ w₈ w₉ Feature map slide dot product y[i,j] = Σₖₘ w[m,n] · x[i+m, j+n] Output size: (W − F + 2P) / S + 1 Same filter weights everywhere → translation invariance MLFP Module 5 — Terrene Open Academy"