  - generic [ref=e19]: "LSTM: Output Gate and Hidden State Theory Output Gate o t = σ ( W o ⋅ [ h t − 1 , x t ] + b o ) Controls which parts of the cell state become the output. Hidden State h t = o t ⊙ tanh ⁡ ( C t ) The hidden state is a filtered, squashed version of the cell state. This is the output at time t. 5 equations, 4 gates: forget ( f t ), input ( i t ), cell update ( C t ), output ( o t ), hidden state ( h t ). Every gate takes the same inputs: [ h t − 1 , x t ] . The difference is the learned weight matrices. Parameter count: For input size d and hidden size h , an LSTM has 4 ( d ⋅ h + h ⋅ h + h ) parameters — four weight matrices, four bias vectors. MLFP Module 5 — Terrene Open Academy"