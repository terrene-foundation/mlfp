  - generic [ref=e508]: "GRU: Gated Recurrent Unit Theory Simplified LSTM Merges cell state and hidden state into one Two gates instead of three: update and reset Fewer parameters, faster training z t = σ ( W z ⋅ [ h t − 1 , x t ] ) z t = σ ( W z ⋅ [ h t − 1 , x t ] ) z t = σ ( W z ⋅ [ h t − 1 , x t ] ) Update gate (combines forget + input) r t = σ ( W r ⋅ [ h t − 1 , x t ] ) r t = σ ( W r ⋅ [ h t − 1 , x t ] ) r t = σ ( W r ⋅ [ h t − 1 , x t ] ) Reset gate (controls previous state influence) LSTM vs GRU Property LSTM GRU Gates 3 + cell 2 Parameters More ~25% fewer Long sequences Better Comparable Small data Overfits more Better Speed Slower Faster Rule of thumb: Start with GRU. Switch to LSTM if performance is insufficient on long sequences. MLFP Module 5 — Terrene Open Academy"