  - text: Speaker notes
  - generic [ref=e19]: "Lesson 5.4: Real-World Applications Applications The BERT fine-tuning pipeline you ran on AG News in Exercise 4 is the same pipeline used everywhere that text has to be classified, summarised, or routed at scale. Swap the dataset, keep the architecture. Finance — Earnings Call & SEC Filing Sentiment Sell-side analysts fine-tune BERT on labelled earnings-call transcripts to score each quarter as beat / miss / guidance-cut — in the first minute after the call ends, not after a human has read it. A MAS-supervised fund house fine-tunes the same model on SGX filings to flag risk language (e.g., \"going concern\", \"material weakness\") for the credit desk. Healthcare — Clinical Note Summarisation Fine-tuned T5 and BART models at public hospitals convert 2,000-word admission notes into 200-word discharge summaries. The clinician edits the summary instead of writing it from scratch — saving 15 minutes per patient across 2M admissions a year. The self-attention mechanism is the same one you derived by hand. Customer Service — IRAS Tax Query Routing A public-sector contact centre fine-tunes BERT on historical tickets to classify incoming queries into 40+ tax-topic buckets and route them to the right specialist. Accuracy on the first 20 classes exceeds the human baseline; the remaining 20 are human-in-the-loop. That is the exact 4-class AG News fine-tune you just ran, scaled up and domain-swapped. Legal — Contract Review Assistance Singapore law firms use fine-tuned transformers to extract obligations, liabilities, and termination clauses from draft contracts. The model highlights the spans; the associate reviews a ranked list. Multi-head attention visualisations are the interpretability layer — the partner wants to see why the model flagged a clause. Why this matters for YOU: Fine-tuning a pre-trained transformer is the cheapest high-impact ML project most organisations can run. You are not training a model from scratch — you are adapting one that already knows language. Data requirements drop by 10× to 100×, training time drops from weeks to hours, and the resulting model is genuinely production-ready. This is where the biggest ROI in M5 lives. MLFP Module 5 — Terrene Open Academy"