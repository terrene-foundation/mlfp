  - generic [ref=e19]: "The RL Paradigm Shift Foundations All DL So Far Static dataset: images, text, sequences, graphs Learn patterns from examples No interaction with the world Data is given, not generated Reinforcement Learning Agent interacts with an environment Takes actions , receives rewards Learns a policy that maximises cumulative reward Generates its own training data through experience Analogy: Supervised learning is learning from a textbook. RL is learning by playing a game. Nobody tells you the right move — you try things, see what works, and develop strategy. MLFP Module 5 — Terrene Open Academy"