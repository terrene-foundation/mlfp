    - generic:
      - heading [level=2]: "Lesson 5.5: Real-World Applications"
      - generic: Applications
      - generic: DCGAN, WGAN-GP, and diffusion — the three generators you built in Exercise 5 — solve a class of problems where the business constraint is "we need more data, but we cannot collect it". Synthetic generation converts a hard collection problem into an ML problem.
      - generic:
        - generic:
          - generic:
            - strong: Healthcare — Privacy-Preserving Training Data
            - paragraph:
              - text: SGH cannot share patient CT scans with a research lab overseas, but it
              - emphasis: can
              - text: share a diffusion model trained on them. The collaborator samples synthetic scans indistinguishable at the pixel level from real ones but containing no actual patient. This is how rare-disease classifiers get enough training data without violating PDPA or HIPAA.
          - generic:
            - strong: Retail — Virtual Try-On & Product Visualisation
            - paragraph: Shopee and Lazada use CycleGAN-style networks (the same adversarial loss family, just with two generators) to paste products onto user photos. A single SKU photo on white background becomes dozens of lifestyle shots — no photo studio, no models, no rental.
        - generic:
          - generic:
            - strong: Finance — Synthetic Tabular Data for Fraud Models
            - paragraph: Banks train fraud models on transaction history, but real fraud examples are rare and sharing them across teams or institutions is blocked by privacy law. Tabular GANs (like CT-GAN, same training dynamics as your WGAN-GP) generate synthetic transaction tables that preserve the joint distribution of fields without containing any real customer. Models trained on the synthetic data generalise to real data at 95%+ of the supervised ceiling.
          - generic:
            - strong: Creative — Marketing Asset Generation
            - paragraph:
              - text: "Agencies use Stable Diffusion for hero images, variant ads, and mood boards. The unit economics are brutal: a hero image that would cost $5,000 in a studio is generated in 30 seconds and iterated 200 times before the art director picks one. Business value is not the pixel quality — it is the"
              - emphasis: iteration rate
              - text: .
      - generic:
        - strong: "Why this matters for YOU:"
        - text: "Synthetic data is the practical wedge for every regulated industry. It lets you train ML models on distributions you cannot legally share. FID (the metric you computed in Exercise 5) is the evidence auditors and regulators want to see: it says \"our synthetic distribution is close enough to the real one for the downstream model to work, without being the real one\"."
