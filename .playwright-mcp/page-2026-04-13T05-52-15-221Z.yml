    - generic [ref=e251]:
      - 'heading "Lesson 5.1: Real-World Applications" [level=2] [ref=e252]'
      - generic [ref=e253]: Applications
      - generic [ref=e254]: An autoencoder that cannot reconstruct an input is telling you that input does not look like what it was trained on. That is the single idea behind every application on this slide.
      - generic [ref=e255]:
        - generic [ref=e256]:
          - generic [ref=e257]:
            - strong [ref=e258]: Finance — Credit Card Fraud (DBS, UOB, OCBC)
            - paragraph [ref=e259]:
              - text: Train a vanilla or denoising AE on millions of
              - emphasis [ref=e260]: normal
              - text: card transactions. At runtime, a transaction whose reconstruction error exceeds a threshold is flagged for review. Works without any labelled fraud examples — critical, because less than 0.1% of real transactions are ever labelled as fraud.
          - generic [ref=e261]:
            - strong [ref=e262]: Healthcare — Medical Imaging Anomalies (SGH, NUH)
            - paragraph [ref=e263]:
              - text: Train a convolutional AE on thousands of
              - emphasis [ref=e264]: normal
              - text: chest X-rays. Lesions, tumours, or effusions produce high reconstruction error because the model has never seen their texture. A radiologist triages from a ranked anomaly list instead of scanning every image.
        - generic [ref=e265]:
          - generic [ref=e266]:
            - strong [ref=e267]: Manufacturing — Defect Detection on the Line
            - paragraph [ref=e268]: A Singapore semiconductor fab trains a conv-AE on wafer images of good dies. When the reconstruction error exceeds a threshold, the wafer is routed for manual inspection. No one has to hand-label every defect class — the AE learns what "normal" looks like and flags the rest.
          - generic [ref=e269]:
            - strong [ref=e270]: Telecom — Network Intrusion Detection (Singtel, StarHub)
            - paragraph [ref=e271]: Train an AE on normal network-flow statistics. Attacker traffic — scans, exfiltration bursts, lateral movement — reconstructs poorly and triggers an alert. The same principle protects VAEs used for synthetic healthcare data, where sampling from the latent prior generates privacy-preserving patient records.
      - generic [ref=e272]:
        - strong [ref=e273]: "Why this matters for YOU:"
        - text: Any time the business says "we do not have labels for the bad cases, only the good ones", an autoencoder is the right first tool. You trade a supervised classifier (needs labelled fraud) for a reconstruction threshold (needs only normal data). In regulated industries where labelled incidents are rare and expensive, this is often the only workable approach.
      - generic [ref=e275]: MLFP Module 5 — Terrene Open Academy
