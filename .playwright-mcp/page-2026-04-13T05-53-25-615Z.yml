  - generic:
    - generic:
      - heading [level=2]: "Lesson 5.7: Real-World Applications"
      - generic: Applications
      - generic: "Exercise 7 showed transfer learning beating from-scratch ResNet on CIFAR-10 while using 10× less data. Every application below is built on that same insight: a pre-trained model is the single biggest free lunch in modern ML."
      - generic:
        - generic:
          - generic:
            - strong: Healthcare — Rare Disease Classification
            - paragraph: A public hospital collects 500 labelled scans of a rare condition. From scratch, that is not enough data to train a CNN. Fine-tuning ImageNet-pretrained ResNet or ViT reaches clinically usable accuracy with that exact 500-example budget. This is the only way rare-disease ML exists at all — and it is the exact data-efficiency experiment you ran in Exercise 7.
          - generic:
            - strong: Finance — Domain-Specific Sentiment on SGX Analyst Reports
            - paragraph: Off-the-shelf BERT sentiment trained on Yelp reviews gets the tone of a sell-side report badly wrong ("aggressive growth" is positive in finance, negative elsewhere). A few thousand labelled SGX analyst reports are enough to fine-tune BERT into a finance-specific model — the same NLP transfer pipeline from the exercise.
        - generic:
          - generic:
            - strong: Manufacturing — Defect Detection with Limited Fault Images
            - paragraph: "A new product line has no historical defect data, but you need a quality classifier in six weeks. Solution: fine-tune a pre-trained vision backbone on the ~200 defect images you can collect, augmented aggressively. Production-usable accuracy in weeks, not the six months it would take to collect \"enough\" data."
          - generic:
            - strong: Retail — Multimodal Product Search on Shopee / Lazada
            - paragraph: CLIP-style models pre-trained on billions of (image, caption) pairs, fine-tuned on an e-commerce catalogue, let a user search "minimalist black dining chair" and retrieve the right SKU — without anyone having hand-tagged "minimalist" as an attribute. The pre-training captured the language-vision alignment; the fine-tune made it catalogue-aware.
      - generic:
        - strong: "Why this matters for YOU:"
        - text: Transfer learning is the answer to "we don't have enough data" — which is the most common blocker on every ML project. If someone tells you the project needs a million labelled examples, ask whether a pre-trained model plus a few thousand in-domain examples would close the gap. 80% of the time it will, at 5% of the cost and 10% of the timeline.
      - generic:
        - generic: MLFP Module 5 — Terrene Open Academy
