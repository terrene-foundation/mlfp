    - generic:
      - heading [level=2]: "Lesson 5.6: Real-World Applications"
      - generic: Applications
      - generic: Graphs appear wherever the interesting question is "who connects to whom" — molecules, money flows, networks, supply chains. GCN, GAT, and GraphSAGE from Exercise 6 are the off-the-shelf tools for all of them.
      - generic:
        - generic:
          - generic:
            - strong: Pharma & Biotech — Drug Discovery
            - paragraph: "Molecules are graphs: atoms are nodes, bonds are edges. GNNs predict solubility, toxicity, and drug-target binding affinity from the graph structure alone — no hand-crafted molecular descriptors. A*STAR's Bioinformatics Institute uses GNN-based virtual screening to narrow 10M-compound libraries down to 1,000 candidates for wet-lab testing."
          - generic:
            - strong: Finance — Anti-Money Laundering at MAS-Regulated Banks
            - paragraph: "Transactions form a graph: accounts are nodes, transfers are edges. AML teams at DBS and OCBC run GNN classifiers over the transaction graph to spot layering and smurfing patterns a rules engine would miss. A single account looks clean; its 3-hop neighbourhood reveals it is the hub of a mule network."
        - generic:
          - generic:
            - strong: Telecom — 5G Network Optimisation
            - paragraph:
              - text: Cell towers form a graph with geographic adjacency edges. Singtel and StarHub use GNNs to predict which towers will congest during Formula 1 weekend or the Lunar New Year commute crush — the GAT attention mechanism tells the ops team
              - emphasis: which neighbouring tower
              - text: is about to offload traffic to the one in question.
          - generic:
            - strong: Logistics — PSA Port Cargo Network
            - paragraph: "Container flows through PSA Singapore are a directed graph: origin port → Singapore → destination port. GNNs predict dwell times and transhipment bottlenecks 48 hours ahead. The GraphSAGE inductive property matters: new ports and new routes can be scored without retraining the full model."
      - generic:
        - strong: "Why this matters for YOU:"
        - text: Most analytics treats every record as independent. Graph data breaks that assumption — the value of a node
        - emphasis: comes from
        - text: its neighbours. If your business has relationships worth exploiting (customers who influence each other, accounts that transfer money, parts that share suppliers), GNNs are how you stop throwing that information away.
      - generic:
        - generic: MLFP Module 5 — Terrene Open Academy
