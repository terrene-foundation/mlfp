          - heading [level=3]: Mode Collapse
          - generic:
            - strong: "Symptom:"
            - text: Generator produces the same output regardless of input noise. It found one image that fools the discriminator and keeps producing it.
          - heading [level=3]: Solutions
          - list:
            - listitem:
              - strong: "WGAN:"
              - text: Wasserstein distance encourages full coverage
            - listitem:
              - strong: "Minibatch discrimination:"
              - text: D sees batch statistics
            - listitem:
              - strong: "Spectral normalisation:"
              - text: stabilise D's Lipschitz constant
        - generic:
          - heading [level=3]: Training Instability
          - generic:
            - strong: "Symptom:"
            - text: Loss oscillates wildly. G and D alternate between dominance. No convergence.
          - heading [level=3]: Best Practices
          - list:
            - listitem: Use Adam with low learning rate (0.0002)
            - listitem: Train D more steps than G (e.g., 5:1 ratio)
            - listitem: Use label smoothing (real labels = 0.9, not 1.0)
            - listitem: Monitor FID during training, not just loss
