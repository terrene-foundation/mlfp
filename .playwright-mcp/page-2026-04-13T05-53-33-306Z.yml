    - generic:
      - heading [level=2]: Lesson 5.8 Summary
      - generic: Foundations
      - generic: RL learns from interaction, not static data. Bellman equations define value. DQN handles discrete actions. PPO handles everything and connects to RLHF.
      - generic:
        - generic:
          - heading [level=3]: Key Takeaways
          - list:
            - listitem: RL = agent + environment + reward + policy
            - listitem: "Bellman equations: recursive value definition"
            - listitem: "DQN: neural network approximates Q-values"
            - listitem: "PPO: clipped objective prevents catastrophic updates"
            - listitem: "RLTrainer: train any algorithm with Kailash"
        - generic:
          - heading [level=3]: What Comes Next
          - paragraph:
            - text: "Module 6:"
            - strong: LLMs, Alignment, and AI Governance
            - text: — PPO becomes RLHF. Transfer learning becomes fine-tuning. Everything you built in M5 is the foundation for production AI systems.
      - generic:
        - generic: MLFP Module 5 — Terrene Open Academy
    - generic [ref=e1452]:
      - 'heading "Lesson 5.8: Real-World Applications" [level=2] [ref=e1453]'
      - generic [ref=e1454]: Applications
      - generic [ref=e1455]:
        - text: Unlike every other lesson in M5, here the exercise environments
        - emphasis [ref=e1456]: are
        - text: the applications. You are not looking at an analogy — you are coding the same decision problems real operations teams face, with the same reward structure and the same state/action space.
      - generic [ref=e1457]:
        - generic [ref=e1458]:
          - generic [ref=e1459]:
            - strong [ref=e1460]: Telecom — ChurnPrevention (DQN)
            - paragraph [ref=e1461]: Singtel's retention team picks a discount tier (do nothing / small / medium / large) each month per customer. Reward = retained revenue − discount cost. The DQN you train in Exercise 8 learns to save its big discounts for customers about to churn, not those who would stay anyway. A rules engine hands out discounts uniformly; the RL policy targets them.
          - generic [ref=e1462]:
            - strong [ref=e1463]: Retail — DynamicPricing (SAC)
            - paragraph [ref=e1464]: Lazada / Shopee price roughly 100M SKUs in real time across demand shocks, competitor moves, and inventory levels. SAC handles the continuous action space (price can be any value in a range) and the uncertainty (demand is noisy). Same continuous-action problem as in your custom env, just at warehouse scale.
          - generic [ref=e1465]:
            - strong [ref=e1466]: Asset Management — PortfolioRebalancing (PPO)
            - paragraph [ref=e1467]: A quant fund rebalances weights across N assets under transaction cost and risk constraints. The PPO clipped objective prevents wild reweighting between steps — exactly what regulators and risk desks require. Same clipped-surrogate trick you coded.
        - generic [ref=e1468]:
          - generic [ref=e1469]:
            - strong [ref=e1470]: Logistics — SupplyChainInventory (PPO)
            - paragraph [ref=e1471]: A Singapore FMCG distributor decides daily replenishment quantities for each of 3,000 SKUs across 40 retail partners. Reward = service level − holding cost − stockout penalty. The RL policy beats rolling safety-stock formulas because it learns which SKUs genuinely co-move and which do not.
          - generic [ref=e1472]:
            - strong [ref=e1473]: Cloud Ops — ResourceAllocation (A2C)
            - paragraph [ref=e1474]: A cloud platform allocates CPU / memory / I/O quotas across tenants under SLA constraints. A2C's advantage baseline reduces variance in the policy-gradient update — critical because allocation decisions are high-stakes and the reward signal is noisy. This is how modern schedulers are increasingly being replaced by learned policies.
          - generic [ref=e1475]:
            - strong [ref=e1476]: Bridge to M6 — RLHF for LLM Alignment
            - paragraph [ref=e1477]: The PPO you wrote for CartPole is the same algorithm that aligns ChatGPT, Claude, and Gemini to human preferences. Reward = human preference model score; action = next token. Exercise 8 is literally the training loop of modern LLM alignment, minus the reward model.
      - generic [ref=e1478]:
        - strong [ref=e1479]: "Why this matters for YOU:"
        - text: "RL is the right tool for repeated operational decisions under feedback — pricing, inventory, resource allocation, retention. The ROI is in the compounding: a small edge per decision times millions of decisions is material. Most importantly, RL is also how modern LLMs are trained to be useful at all, which is why Module 6 picks up exactly where this lesson stops."
      - generic [ref=e1481]: MLFP Module 5 — Terrene Open Academy
