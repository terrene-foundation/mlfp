        - generic:
          - heading [level=3]: Why Attention?
          - generic:
            - strong: "Without attention:"
            - text: the model must compress an entire sequence into a single fixed-size vector (the last hidden state). Long sequences lose early information.
          - generic:
            - strong: "With attention:"
            - text: the model can "look back" at any time step. The attention weights are interpretable — you can see which inputs the model focuses on.
          - paragraph: This is the precursor to self-attention in Transformers (Lesson 5.4).
