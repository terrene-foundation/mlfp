      - heading [level=2]: "CV Transfer Learning: ResNet Fine-Tuning"
      - generic: Theory
      - generic:
        - generic:
          - heading [level=3]: Strategy
          - list:
            - listitem: Load pre-trained ResNet (ImageNet weights)
            - listitem: Freeze all layers except the last block
            - listitem: Replace the final FC layer with new classifier head
            - listitem: Fine-tune with low learning rate (1e-4 to 1e-5)
          - generic:
            - code: "import torchvision.models as models resnet = models.resnet50(pretrained=True) # Freeze all layers for param in resnet.parameters(): param.requires_grad = False # Replace classifier head resnet.fc = nn.Linear(2048, num_classes) # Optionally unfreeze last block for param in resnet.layer4.parameters(): param.requires_grad = True"
        - generic:
          - heading [level=3]: Data Augmentation for Small Datasets
          - list:
            - listitem: Random horizontal flip
            - listitem: Random rotation (up to 15 degrees)
            - listitem: Colour jitter (brightness, contrast)
            - listitem: Random crop with resize
          - generic:
            - strong: "Progressive unfreezing:"
            - text: Start fully frozen. Train head for a few epochs. Then unfreeze the last block. Then the next. This prevents catastrophic forgetting of pre-trained features.
